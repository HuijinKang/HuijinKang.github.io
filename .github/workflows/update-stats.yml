name: Update download stats

on:
  schedule:
    # 매일 02:17 UTC (정시는 러너 혼잡으로 지연될 수 있어 비정시 사용)
    - cron: "17 2 * * *"
  workflow_dispatch: # 수동 실행도 허용

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch download counts from Play Store
        run: node scripts/update-downloads.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet data.js; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "chore: update download stats ($(date -u +%Y-%m-%d))"
          git push
